services:
  app-blue:
    build: .
    container_name: app-blue
    environment:
      APP_VERSION: "v1"
    expose:
      - "5000"

  app-green:
    build: .
    container_name: app-green
    environment:
      APP_VERSION: "v2"
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-blue